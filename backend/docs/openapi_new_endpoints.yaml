      responses:
        '200':
          description: Calculated price

  # ===== ROLES MODULE =====
  /roles:
    get:
      tags: [Roles]
      summary: List roles
      responses:
        '200':
          description: Roles list

    post:
      tags: [Roles]
      summary: Create role
      responses:
        '201':
          description: Role created

  /roles/{id}:
    get:
      tags: [Roles]
      summary: Get role
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
