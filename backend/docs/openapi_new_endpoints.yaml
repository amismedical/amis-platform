openapi: 3.0.3
info:
  title: AMIS API - New Modules
  description: |
    AMIS (Advanced Medical Information System) API specification
    for new module endpoints.
    Status: Module Structure - Business logic pending
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Development server

tags:
  - name: Register
    description: Registratura - Appointment registration
  - name: Director
    description: Director panel - Reports and analytics
  - name: Hospital
    description: Hospital - Inpatient management
  - name: Services
    description: Services management
  - name: Staff
    description: Staff management
  - name: Referral
    description: Referral sources management
  - name: Expenses
    description: Expense management
  - name: Deposits
    description: Patient deposits
  - name: PriceCategories
    description: Price category management
  - name: Roles
    description: RBAC Roles and permissions
  - name: QueueDisplay
    description: Queue display WebApp

paths:
  # ===== REGISTRATURA MODULE =====
  /register/active:
    get:
      tags: [Register]
      summary: Get active appointments
      parameters:
        - name: date
          in: query
          schema: { type: string, format: date }
        - name: doctor_id
          in: query
          schema: { type: string, format: uuid }
        - name: service_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Active appointments list

  /register/completed:
    get:
      tags: [Register]
      summary: Get completed appointments
      parameters:
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
        - name: patient_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Completed appointments list

  /register/cancelled:
    get:
      tags: [Register]
      summary: Get cancelled appointments
      responses:
        '200':
          description: Cancelled appointments list

  /register/appointments:
    post:
      tags: [Register]
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patient_id, doctor_id, service_id, appointment_date, start_time]
              properties:
                patient_id: { type: string, format: uuid }
                doctor_id: { type: string, format: uuid }
                service_id: { type: string, format: uuid }
                appointment_date: { type: string, format: date }
                start_time: { type: string }
                booking_method: { type: string }
                notes: { type: string }
      responses:
        '201':
          description: Appointment created

  /register/appointments/{id}:
    put:
      tags: [Register]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Appointment updated

  /register/appointments/{id}/cancel:
    post:
      tags: [Register]
      summary: Cancel appointment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Appointment cancelled

  /register/search:
    get:
      tags: [Register]
      summary: Search patient
      parameters:
        - name: search
          in: query
          schema: { type: string }
        - name: phone
          in: query
          schema: { type: string }
        - name: passport
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Patient search results

  /register/slots:
    get:
      tags: [Register]
      summary: Get available slots
      parameters:
        - name: doctor_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
        - name: service_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Available time slots

  /register/queue-status:
    get:
      tags: [Register]
      summary: Get queue status
      responses:
        '200':
          description: Queue status

  # ===== DIRECTOR MODULE =====
  /director/dashboard:
    get:
      tags: [Director]
      summary: Get dashboard data
      responses:
        '200':
          description: Dashboard data

  /director/appointments:
    get:
      tags: [Director]
      summary: Get appointments statistics
      parameters:
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Appointments statistics

  /director/revenue:
    get:
      tags: [Director]
      summary: Get revenue statistics
      parameters:
        - name: date_from
          in: query
          schema: { type: string, format: date }
        - name: date_to
          in: query
          schema: { type: string, format: date }
        - name: group_by
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Revenue statistics

  /director/doctor-performance:
    get:
      tags: [Director]
      summary: Get doctor performance
      responses:
        '200':
          description: Doctor performance data

  /director/services:
    get:
      tags: [Director]
      summary: Get services statistics
      responses:
        '200':
          description: Services statistics

  /director/doctors:
    get:
      tags: [Director]
      summary: Get doctors list
      responses:
        '200':
          description: Doctors list

  /director/patients:
    get:
      tags: [Director]
      summary: Get patients list
      responses:
        '200':
          description: Patients list

  /director/expenses:
    get:
      tags: [Director]
      summary: Get expenses
      responses:
        '200':
          description: Expenses data

  /director/referral:
    get:
      tags: [Director]
      summary: Get referral statistics
      responses:
        '200':
          description: Referral statistics

  /director/statistics:
    get:
      tags: [Director]
      summary: Get general statistics
      responses:
        '200':
          description: General statistics

  /director/doctors/{id}/services:
    get:
      tags: [Director]
      summary: Get services by doctor
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Doctor services

  /director/services/{id}/stats:
    get:
      tags: [Director]
      summary: Get service statistics
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Service statistics

  /director/patients/{id}/services:
    get:
      tags: [Director]
      summary: Get patient services
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Patient services

  /director/reports/doctor-service:
    get:
      tags: [Director]
      summary: Get doctor-service intersection report
      responses:
        '200':
          description: Doctor-service report

  /director/price-list:
    get:
      tags: [Director]
      summary: Get price list
      responses:
        '200':
          description: Price list

  /director/service-groups:
    get:
      tags: [Director]
      summary: Get service groups
      responses:
        '200':
          description: Service groups

  /director/referral-accruals:
    get:
      tags: [Director]
      summary: Get referral accruals
      responses:
        '200':
          description: Referral accruals

  /director/referral-commissions:
    get:
      tags: [Director]
      summary: Get referral commissions
      responses:
        '200':
          description: Referral commissions

  /director/referral-sources/{id}/patients:
    get:
      tags: [Director]
      summary: Get referral source patients
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Referral source patients

  # ===== HOSPITAL MODULE =====
  /hospital/admissions:
    get:
      tags: [Hospital]
      summary: List admissions
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: department_id
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Admissions list

    post:
      tags: [Hospital]
      summary: Create admission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patient_id, department_id, room_id, bed_id, diagnosis, admission_date, doctor_id]
              properties:
                patient_id: { type: string, format: uuid }
                department_id: { type: string, format: uuid }
                room_id: { type: string, format: uuid }
                bed_id: { type: string, format: uuid }
                diagnosis: { type: string }
                admission_date: { type: string, format: date }
                doctor_id: { type: string, format: uuid }
      responses:
        '201':
          description: Admission created

  /hospital/admissions/{id}:
    get:
      tags: [Hospital]
      summary: Get admission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Admission details

  /hospital/admissions/{id}/transfer:
    post:
      tags: [Hospital]
      summary: Transfer patient
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                department_id: { type: string, format: uuid }
                room_id: { type: string, format: uuid }
                bed_id: { type: string, format: uuid }
                reason: { type: string }
      responses:
        '200':
          description: Patient transferred

  /hospital/admissions/{id}/discharge:
    post:
      tags: [Hospital]
      summary: Discharge patient
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              properties:
                discharge_date: { type: string, format: date }
                diagnosis: { type: string }
                outcome: { type: string }
                recommendations: { type: string }
      responses:
        '200':
          description: Patient discharged

  /hospital/departments:
    get:
      tags: [Hospital]
      summary: List departments
      responses:
        '200':
          description: Departments list

  /hospital/rooms:
    get:
      tags: [Hospital]
      summary: List rooms
      parameters:
        - name: department_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Rooms list

  /hospital/beds:
    get:
      tags: [Hospital]
      summary: List beds
      parameters:
        - name: room_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
