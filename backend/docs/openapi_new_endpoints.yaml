      responses:
        '200':
          description: Beds list

  # ===== SERVICES MODULE =====
  /services:
    get:
      tags: [Services]
      summary: List services
      responses:
        '200':
          description: Services list

    post:
      tags: [Services]
      summary: Create service
      responses:
        '201':
          description: Service created

  /services/{id}:
    get:
      tags: [Services]
      summary: Get service
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Service details

    put:
      tags: [Services]
      summary: Update service
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Service updated

    delete:
      tags: [Services]
      summary: Delete service
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Service deleted

  /services/groups:
    get:
      tags: [Services]
      summary: List service groups
      responses:
        '200':
          description: Service groups

    post:
      tags: [Services]
      summary: Create service group
      responses:
        '201':
          description: Service group created

  /services/prices:
    get:
      tags: [Services]
      summary: List service prices
      responses:
        '200':
          description: Service prices

    post:
      tags: [Services]
      summary: Set service price
      responses:
        '201':
          description: Price set

  # ===== STAFF MODULE =====
  /staff:
    get:
      tags: [Staff]
      summary: List staff
      responses:
        '200':
          description: Staff list

    post:
      tags: [Staff]
      summary: Create staff
      responses:
        '201':
          description: Staff created

  /staff/{id}:
    get:
      tags: [Staff]
      summary: Get staff
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Staff details

    put:
      tags: [Staff]
      summary: Update staff
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Staff updated

  /staff/{id}/schedule:
    get:
      tags: [Staff]
      summary: Get staff schedule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Staff schedule

    post:
      tags: [Staff]
      summary: Set staff schedule
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Schedule set

  /staff/{id}/absences:
    get:
      tags: [Staff]
      summary: Get staff absences
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Staff absences

    post:
      tags: [Staff]
      summary: Add staff absence
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '201':
          description: Absence added

  /staff/{id}/statistics:
    get:
      tags: [Staff]
      summary: Get staff statistics
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Staff statistics

  /staff/{id}/working-days:
    get:
      tags: [Staff]
      summary: Get working days
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Working days

  /staff/schedule-templates:
    get:
      tags: [Staff]
      summary: List schedule templates
      responses:
        '200':
          description: Schedule templates

    post:
      tags: [Staff]
      summary: Create schedule template
      responses:
        '201':
          description: Template created

  # ===== REFERRAL MODULE =====
  /referral/sources:
    get:
      tags: [Referral]
      summary: List referral sources
      responses:
        '200':
          description: Referral sources

    post:
      tags: [Referral]
      summary: Create referral source
      responses:
        '201':
          description: Referral source created

  /referral/sources/{id}:
