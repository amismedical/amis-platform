    put:
      tags: [Roles]
      summary: Update role
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Role updated

    delete:
      tags: [Roles]
      summary: Delete role
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Role deleted

  /roles/{id}/permissions:
    get:
      tags: [Roles]
      summary: Get role permissions
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Role permissions

    put:
      tags: [Roles]
      summary: Update role permissions
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Permissions updated

  /permissions:
    get:
      tags: [Roles]
      summary: List all permissions
      responses:
        '200':
          description: Permissions list

  /users/{id}/roles:
    post:
      tags: [Roles]
      summary: Assign role to user
      parameters:
        - name: id
