      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Referral source updated

    delete:
      tags: [Referral]
      summary: Delete referral source
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Referral source deleted

  /referral/accruals:
    get:
      tags: [Referral]
      summary: List referral accruals
      responses:
        '200':
          description: Referral accruals

    post:
      tags: [Referral]
      summary: Create referral accrual
      responses:
        '201':
          description: Accrual created

  /referral/commissions:
    get:
      tags: [Referral]
      summary: List referral commissions
      responses:
        '200':
          description: Referral commissions

  /referral/commissions/{id}/pay:
    post:
      tags: [Referral]
      summary: Pay commission
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Commission paid

  /referral/sources/{id}/patients:
    get:
      tags: [Referral]
      summary: Get source patients
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Source patients

