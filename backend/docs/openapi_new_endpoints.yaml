      responses:
        '200':
          description: Patient deposit

  /deposits/topup:
    post:
      tags: [Deposits]
      summary: Top up deposit
      responses:
        '200':
          description: Deposit topped up

  /deposits/withdraw:
    post:
      tags: [Deposits]
      summary: Withdraw from deposit
      responses:
        '200':
