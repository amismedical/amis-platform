  /deposits/search:
    get:
      tags: [Deposits]
      summary: Search patient for deposit
      responses:
        '200':
          description: Patient search results

  # ===== PRICE CATEGORIES MODULE =====
  /price-categories:
    get:
      tags: [PriceCategories]
      summary: List price categories
      responses:
        '200':
          description: Price categories list

    post:
      tags: [PriceCategories]
      summary: Create price category
      responses:
        '201':
          description: Price category created

  /price-categories/{id}:
    get:
      tags: [PriceCategories]
      summary: Get price category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Price category details

    put:
      tags: [PriceCategories]
      summary: Update price category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Price category updated

    delete:
      tags: [PriceCategories]
      summary: Delete price category
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
