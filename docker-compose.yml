# ===========================================
# AMIS Medical System - Production Deployment
# Ubuntu 24.04 VPS
# ===========================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: amis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secure_password}
      POSTGRES_DB: ${DB_NAME:-amis}
    ports:
      - "127.0.0.1:5432:5432"  # Only accessible locally
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/repository/postgres/migrations.sql:/docker-entrypoint-initdb.d/01-migrations.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amis-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: amis-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # Only accessible locally
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amis-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Go Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amis-api
    restart: unless-stopped
    environment:
      GIN_MODE: release
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres_secure_password}
      DB_NAME: ${DB_NAME:-amis}
      DB_SSLMODE: disable
      DB_MAX_CONNS: 20
      DB_MIN_CONNS: 5
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret}
      JWT_ACCESS_TOKEN_TTL: 60
      JWT_REFRESH_TOKEN_TTL: 10080
      APP_URL: ${APP_URL:-http://localhost}
      API_URL: ${API_URL:-http://localhost:8080}
    ports:
      - "127.0.0.1:8080:8080"  # Only accessible locally, nginx proxies
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - amis-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Nginx Frontend + Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: amis-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - amis-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  amis-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
